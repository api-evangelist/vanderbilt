aid: vanderbilt
name: Vanderbilt University
description: >-
  Vanderbilt University is a private research university in Nashville,
  Tennessee, ranked #248 in the QS World University Rankings 2025. Its public
  developer/API footprint is limited and largely gated: Vanderbilt IT (VUIT)
  offers API integration and management services to faculty and staff, fronted
  by an Azure API Management developer portal that does not resolve for the
  general public (internal/network-gated). The Jean and Alexander Heard
  Libraries maintain an open GitHub presence (linked data, semantic web,
  institutional repository tooling) and run an Ex Libris Alma/Primo library
  platform that supports standard OAI-PMH and discovery APIs. No official,
  publicly documented, self-service Vanderbilt API was confirmed during review.
